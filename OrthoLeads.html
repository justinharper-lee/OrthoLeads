<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ortho Referral Heatmap</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0E3A5A; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: #0b2e47;
  border-bottom: 1px solid #1a4f6e;
  flex-shrink: 0;
  flex-wrap: wrap;
}

#toolbar h1 { font-size: 14px; font-weight: 600; color: #53C2B1; margin-right: 6px; white-space: nowrap; }

.toggle-btn {
  background: transparent; border: 1px solid #53C2B1;
  color: #53C2B1; border-radius: 4px;
  padding: 4px 12px; font-size: 12px; cursor: pointer;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
.toggle-btn.active { background: #53C2B1; color: #0E3A5A; font-weight: 600; }

.sep { width: 1px; height: 20px; background: #1a4f6e; }

label { font-size: 11px; color: #a0c4d8; white-space: nowrap; }
select, input[type=text] {
  background: #0E3A5A; border: 1px solid #1a4f6e;
  color: #fff; border-radius: 4px; padding: 3px 7px;
  font-size: 12px; outline: none;
}
select:focus, input:focus { border-color: #53C2B1; }

#map { flex: 1; width: 100%; }

#tooltip {
  position: fixed; display: none;
  background: #0b2e47; border: 1px solid #53C2B1;
  color: #fff; border-radius: 6px;
  padding: 8px 12px; font-size: 12px;
  pointer-events: none; z-index: 9999;
  max-width: 240px; line-height: 1.6;
}

#legend {
  position: absolute; bottom: 24px; right: 12px;
  background: rgba(11,46,71,0.92); border: 1px solid #1a4f6e;
  border-radius: 6px; padding: 8px 12px; font-size: 11px;
  z-index: 999; min-width: 130px;
}
#legend .leg-title { color: #53C2B1; font-weight: 600; margin-bottom: 6px; }
#legend .leg-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
#legend .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#legend .leg-rect { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

#stats {
  position: absolute; top: 8px; right: 12px;
  display: flex; gap: 8px; z-index: 999;
}
.stat-card {
  background: rgba(11,46,71,0.92); border: 1px solid #1a4f6e;
  border-radius: 6px; padding: 6px 12px; text-align: center;
}
.stat-card .val { font-size: 18px; font-weight: 700; color: #53C2B1; }
.stat-card .lbl { font-size: 10px; color: #a0c4d8; }

#no-data {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  color: #a0c4d8; font-size: 14px; text-align: center;
  pointer-events: none; z-index: 998;
}
</style>

<body>

<div id="toolbar">
  <h1>Ortho Referral Map</h1>
  <button class="toggle-btn active" id="btn-point" onclick="setMode('point')">Point map</button>
  <button class="toggle-btn" id="btn-state" onclick="setMode('state')">State map</button>
  <div class="sep"></div>
  <label>Match type</label>
  <select id="filter-type" onchange="applyFilters()">
    <option value="all">All</option>
    <option value="Organization">Organization</option>
    <option value="Individual">Individual</option>
  </select>
  <div class="sep"></div>
  <label>State</label>
  <select id="filter-state" onchange="applyFilters()">
    <option value="all">All states</option>
  </select>
  <div class="sep"></div>
  <label>Search facility</label>
  <input type="text" id="filter-name" placeholder="type to filter..." oninput="applyFilters()" style="width:140px"/>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>
  <div id="stats">
    <div class="stat-card"><div class="val" id="stat-referrals">0</div><div class="lbl">Referrals</div></div>
    <div class="stat-card"><div class="val" id="stat-facilities">0</div><div class="lbl">Facilities</div></div>
    <div class="stat-card"><div class="val" id="stat-states">0</div><div class="lbl">States</div></div>
  </div>
  <div id="legend"></div>
  <div id="no-data">No data matches current filters</div>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

const BRAND = { dark: '#0E3A5A', teal: '#53C2B1', green: '#B2C81B', mid: '#1a6e8a' };

const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([38, -96], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 18, subdomains: 'abcd'
}).addTo(map);

L.control.attribution({ prefix: false }).addTo(map);

const pointLayer = L.layerGroup().addTo(map);
const stateLayer = L.layerGroup();

let mode = 'point';
let allData = [];
let filteredData = [];
let stateGeo = null;

function setMode(m) {
  mode = m;
  document.getElementById('btn-point').classList.toggle('active', m === 'point');
  document.getElementById('btn-state').classList.toggle('active', m === 'state');
  renderMap();
  renderLegend();
}

function getPowerBIData() {
  try {
    if (window.powerbi && powerbi.data) {
      const ds = powerbi.data;
      const rows = ds.rows || [];
      const cols = (ds.columns || []).map(c => c.displayName || c.queryName || '');
      const idx = name => cols.findIndex(c => c.toLowerCase().includes(name.toLowerCase()));
      const iLat   = idx('lat');
      const iLng   = idx('long');
      const iName  = idx('facility name');
      const iState = idx('facility state');
      const iType  = idx('match type');
      const iID    = idx('id');
      if (iLat < 0 || iLng < 0) return null;
      return rows.map(r => ({
        lat:   parseFloat(r[iLat]),
        lng:   parseFloat(r[iLng]),
        name:  iName  >= 0 ? r[iName]  : 'Unknown',
        state: iState >= 0 ? r[iState] : '',
        type:  iType  >= 0 ? r[iType]  : '',
        id:    iID    >= 0 ? r[iID]    : null,
        count: 1
      })).filter(d => !isNaN(d.lat) && !isNaN(d.lng));
    }
  } catch(e) {}
  return null;
}

function getSampleData() {
  return [
    { lat:32.62, lng:-83.65, name:'Robins Medical Associates',      state:'GA', type:'Organization', count:47 },
    { lat:28.55, lng:-81.72, name:'Orlando Foot & Ankle Clinic',    state:'FL', type:'Organization', count:38 },
    { lat:35.80, lng:-78.51, name:'UNC Physicians Network',         state:'NC', type:'Organization', count:55 },
    { lat:29.57, lng:-95.78, name:'UT Physicians',                  state:'TX', type:'Organization', count:62 },
    { lat:37.15, lng:-93.28, name:'Nitesh Byrappa',                 state:'MO', type:'Individual',   count:12 },
    { lat:38.60, lng:-89.99, name:'Erica Criss',                    state:'IL', type:'Individual',   count:8  },
    { lat:35.99, lng:-78.53, name:'Timothy Finn',                   state:'NC', type:'Individual',   count:15 },
    { lat:39.66, lng:-75.63, name:'Sridevi Donepudi',               state:'DE', type:'Individual',   count:6  },
    { lat:33.75, lng:-84.39, name:'Piedmont Orthopedics',           state:'GA', type:'Organization', count:41 },
    { lat:30.33, lng:-81.66, name:'Jacksonville Ortho Institute',   state:'FL', type:'Organization', count:33 },
    { lat:36.17, lng:-86.78, name:'Nashville Bone & Joint',         state:'TN', type:'Organization', count:29 },
    { lat:32.78, lng:-96.80, name:'Dallas Orthopedic Center',       state:'TX', type:'Organization', count:71 },
    { lat:29.76, lng:-95.37, name:'Houston Spine & Ortho',          state:'TX', type:'Organization', count:58 },
    { lat:30.27, lng:-97.74, name:'Austin Ortho Group',             state:'TX', type:'Organization', count:44 },
    { lat:35.23, lng:-80.84, name:'Charlotte Rehab Associates',     state:'NC', type:'Organization', count:37 },
    { lat:34.00, lng:-81.03, name:'Columbia Orthopedic Group',      state:'SC', type:'Organization', count:22 },
    { lat:33.45, lng:-112.07,name:'Phoenix Ortho Partners',         state:'AZ', type:'Organization', count:19 },
    { lat:36.17, lng:-115.14,name:'Las Vegas Spine Center',         state:'NV', type:'Organization', count:14 },
    { lat:39.74, lng:-104.98,name:'Denver Bone & Joint',            state:'CO', type:'Organization', count:31 },
    { lat:47.61, lng:-122.33,name:'Seattle Orthopedic Group',       state:'WA', type:'Organization', count:27 },
  ];
}

function aggregateByFacility(rows) {
  const map_ = {};
  rows.forEach(r => {
    const key = r.name + '|' + r.lat + '|' + r.lng;
    if (!map_[key]) map_[key] = { ...r, count: 0 };
    map_[key].count += (r.count || 1);
  });
  return Object.values(map_);
}

function aggregateByState(rows) {
  const map_ = {};
  rows.forEach(r => {
    if (!r.state) return;
    if (!map_[r.state]) map_[r.state] = 0;
    map_[r.state] += (r.count || 1);
  });
  return map_;
}

function colorForCount(count, max) {
  const t = Math.min(count / Math.max(max, 1), 1);
  if (t < 0.33) return BRAND.teal;
  if (t < 0.66) return BRAND.green;
  return '#ff7043';
}

function radiusForCount(count, max) {
  const t = Math.min(count / Math.max(max, 1), 1);
  return 6 + t * 22;
}

function renderPoints(data) {
  pointLayer.clearLayers();
  if (!data.length) { document.getElementById('no-data').style.display = 'block'; return; }
  document.getElementById('no-data').style.display = 'none';
  const agg = aggregateByFacility(data);
  const max = Math.max(...agg.map(d => d.count));
  agg.forEach(d => {
    const circle = L.circleMarker([d.lat, d.lng], {
      radius: radiusForCount(d.count, max),
      fillColor: colorForCount(d.count, max),
      fillOpacity: 0.82,
      color: '#fff',
      weight: 1.2,
    }).addTo(pointLayer);
    circle.on('mouseover', function(e) {
      const tip = document.getElementById('tooltip');
      tip.style.display = 'block';
      tip.innerHTML = `<b style="color:#53C2B1">${d.name}</b><br>State: ${d.state}<br>Type: ${d.type}<br><b>${d.count} referral${d.count !== 1 ? 's' : ''}</b>`;
      tip.style.left = (e.originalEvent.pageX + 14) + 'px';
      tip.style.top  = (e.originalEvent.pageY - 10) + 'px';
    });
    circle.on('mousemove', function(e) {
      const tip = document.getElementById('tooltip');
      tip.style.left = (e.originalEvent.pageX + 14) + 'px';
      tip.style.top  = (e.originalEvent.pageY - 10) + 'px';
    });
    circle.on('mouseout', () => document.getElementById('tooltip').style.display = 'none');
  });
}

function renderStateMap(data) {
  stateLayer.clearLayers();
  if (!stateGeo) return;
  if (!data.length) { document.getElementById('no-data').style.display = 'block'; return; }
  document.getElementById('no-data').style.display = 'none';
  const counts = aggregateByState(data);
  const max = Math.max(...Object.values(counts), 1);

  function getColor(abbr) {
    const c = counts[abbr] || 0;
    if (!c) return 'rgba(255,255,255,0.04)';
    const t = c / max;
    if (t < 0.2)  return 'rgba(83,194,177,0.35)';
    if (t < 0.4)  return 'rgba(83,194,177,0.55)';
    if (t < 0.6)  return 'rgba(178,200,27,0.65)';
    if (t < 0.8)  return 'rgba(178,200,27,0.85)';
    return 'rgba(255,112,67,0.9)';
  }

  L.geoJSON(stateGeo, {
    style: feature => ({
      fillColor: getColor(feature.properties.abbr),
      fillOpacity: 1,
      color: 'rgba(83,194,177,0.3)',
      weight: 0.8,
    }),
    onEachFeature: (feature, layer) => {
      const abbr = feature.properties.abbr;
      const count = counts[abbr] || 0;
      layer.on('mouseover', function(e) {
        const tip = document.getElementById('tooltip');
        tip.style.display = 'block';
        tip.innerHTML = `<b style="color:#53C2B1">${feature.properties.name}</b><br><b>${count} referral${count !== 1 ? 's' : ''}</b>`;
        tip.style.left = (e.originalEvent.pageX + 14) + 'px';
        tip.style.top  = (e.originalEvent.pageY - 10) + 'px';
        layer.setStyle({ fillOpacity: 0.95, weight: 1.5, color: '#53C2B1' });
      });
      layer.on('mousemove', function(e) {
        document.getElementById('tooltip').style.left = (e.originalEvent.pageX + 14) + 'px';
        document.getElementById('tooltip').style.top  = (e.originalEvent.pageY - 10) + 'px';
      });
      layer.on('mouseout', function() {
        document.getElementById('tooltip').style.display = 'none';
        layer.setStyle({ fillOpacity: 1, weight: 0.8, color: 'rgba(83,194,177,0.3)' });
      });
    }
  }).addTo(stateLayer);
}

function renderMap() {
  if (mode === 'point') {
    map.removeLayer(stateLayer);
    pointLayer.addTo(map);
    renderPoints(filteredData);
  } else {
    map.removeLayer(pointLayer);
    stateLayer.addTo(map);
    renderStateMap(filteredData);
  }
  updateStats();
}

function renderLegend() {
  const el = document.getElementById('legend');
  if (mode === 'point') {
    el.innerHTML = `<div class="leg-title">Referral volume</div>
      <div class="leg-row"><div class="leg-dot" style="background:#53C2B1"></div><span>Low</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#B2C81B"></div><span>Medium</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#ff7043"></div><span>High</span></div>
      <div style="margin-top:8px;border-top:1px solid #1a4f6e;padding-top:6px">
      <div class="leg-row"><div class="leg-dot" style="background:#53C2B1;opacity:0.9"></div><span>Organization</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#B2C81B;opacity:0.9"></div><span>Individual</span></div>
      </div>`;
  } else {
    el.innerHTML = `<div class="leg-title">Referrals by state</div>
      <div class="leg-row"><div class="leg-rect" style="background:rgba(83,194,177,0.35)"></div><span>Very low</span></div>
      <div class="leg-row"><div class="leg-rect" style="background:rgba(83,194,177,0.55)"></div><span>Low</span></div>
      <div class="leg-row"><div class="leg-rect" style="background:rgba(178,200,27,0.65)"></div><span>Medium</span></div>
      <div class="leg-row"><div class="leg-rect" style="background:rgba(178,200,27,0.85)"></div><span>High</span></div>
      <div class="leg-row"><div class="leg-rect" style="background:rgba(255,112,67,0.9)"></div><span>Very high</span></div>`;
  }
}

function updateStats() {
  const agg = aggregateByFacility(filteredData);
  const total = filteredData.reduce((s, d) => s + (d.count || 1), 0);
  const states = new Set(filteredData.map(d => d.state).filter(Boolean)).size;
  document.getElementById('stat-referrals').textContent = total.toLocaleString();
  document.getElementById('stat-facilities').textContent = agg.length.toLocaleString();
  document.getElementById('stat-states').textContent = states;
}

function populateStateFilter(data) {
  const sel = document.getElementById('filter-state');
  const states = [...new Set(data.map(d => d.state).filter(Boolean))].sort();
  sel.innerHTML = '<option value="all">All states</option>' +
    states.map(s => `<option value="${s}">${s}</option>`).join('');
}

function applyFilters() {
  const type  = document.getElementById('filter-type').value;
  const state = document.getElementById('filter-state').value;
  const name  = document.getElementById('filter-name').value.toLowerCase();
  filteredData = allData.filter(d =>
    (type  === 'all' || d.type  === type)  &&
    (state === 'all' || d.state === state) &&
    (!name || (d.name || '').toLowerCase().includes(name))
  );
  renderMap();
}

async function loadStateGeoJSON() {
  const url = 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json';
  try {
    const resp = await fetch(url);
    const topo = await resp.json();
    const { feature } = await import('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js');
    const stateAbbr = {"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY","District of Columbia":"DC"};
    stateGeo = feature(topo, topo.objects.states);
    stateGeo.features.forEach(f => {
      const name = f.properties.name;
      f.properties.abbr = stateAbbr[name] || name;
    });
  } catch(e) {
    console.warn('Could not load state GeoJSON:', e);
  }
}

async function init() {
  await loadStateGeoJSON();
  const pbData = getPowerBIData();
  allData = pbData || getSampleData();
  filteredData = [...allData];
  populateStateFilter(allData);
  renderMap();
  renderLegend();
}

init();

if (window.powerbi) {
  powerbi.on('dataChanged', () => {
    const pbData = getPowerBIData();
    if (pbData) {
      allData = pbData;
      filteredData = [...allData];
      populateStateFilter(allData);
      applyFilters();
    }
  });
}
</script>
</body>
</html>
